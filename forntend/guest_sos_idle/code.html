<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&amp;family=Space+Mono:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "on-primary-container": "#5c0002",
                "outline-variant": "#5d3f3b",
                "on-tertiary-fixed": "#001f29",
                "inverse-surface": "#fcdbd6",
                "inverse-primary": "#c0000a",
                "tertiary-container": "#1d9cc3",
                "on-tertiary": "#003545",
                "tertiary-fixed-dim": "#68d3fc",
                "on-tertiary-fixed-variant": "#004d63",
                "outline": "#ad8883",
                "surface-bright": "#493431",
                "surface-container-lowest": "#190a08",
                "on-primary": "#690003",
                "surface-container": "#2d1b18",
                "surface-tint": "#ffb4aa",
                "on-error-container": "#ffdad6",
                "primary-container": "#ff5545",
                "on-secondary-container": "#00285c",
                "on-primary-fixed-variant": "#930005",
                "tertiary": "#68d3fc",
                "surface": "#1f0f0d",
                "background": "#1f0f0d",
                "surface-container-high": "#392522",
                "surface-dim": "#1f0f0d",
                "on-secondary-fixed-variant": "#004493",
                "secondary": "#adc6ff",
                "inverse-on-surface": "#402b29",
                "on-error": "#690005",
                "secondary-container": "#4b8eff",
                "error-container": "#93000a",
                "on-tertiary-container": "#002e3c",
                "on-surface-variant": "#e7bdb7",
                "primary": "#ffb4aa",
                "on-background": "#fcdbd6",
                "on-surface": "#fcdbd6",
                "surface-container-low": "#291715",
                "secondary-fixed-dim": "#adc6ff",
                "tertiary-fixed": "#bbe9ff",
                "on-secondary": "#002e69",
                "error": "#ffb4ab",
                "surface-variant": "#44302d",
                "primary-fixed": "#ffdad5",
                "on-secondary-fixed": "#001a41",
                "on-primary-fixed": "#410001",
                "secondary-fixed": "#d8e2ff",
                "surface-container-highest": "#44302d",
                "primary-fixed-dim": "#ffb4aa"
            },
            "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
            },
            "spacing": {
                "xl": "64px",
                "margin": "20px",
                "sm": "12px",
                "gutter": "16px",
                "xs": "8px",
                "lg": "40px",
                "md": "24px",
                "base": "4px"
            },
            "fontFamily": {
                "h2": ["Syne"],
                "tactical-data": ["Space Mono"],
                "h3": ["Syne"],
                "body-lg": ["Syne"],
                "body-md": ["Syne"],
                "badge": ["Space Mono"],
                "tactical-label": ["Space Mono"],
                "h1": ["Syne"]
            },
            "fontSize": {
                "h2": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                "tactical-data": ["14px", {"lineHeight": "1.2", "fontWeight": "400"}],
                "h3": ["24px", {"lineHeight": "1.2", "fontWeight": "700"}],
                "body-lg": ["18px", {"lineHeight": "1.5", "fontWeight": "500"}],
                "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                "badge": ["10px", {"lineHeight": "1", "fontWeight": "700"}],
                "tactical-label": ["12px", {"lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700"}],
                "h1": ["40px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800"}]
            }
          },
        },
      }
    </script>
<style>
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.6); opacity: 0; }
        }
        .pulse-effect {
            position: absolute;
            border-radius: 9999px;
            background-color: #FF3B30;
            z-index: 0;
            animation: pulse-ring 2.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        .pulse-effect-delayed {
            animation-delay: 1.25s;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#080808] text-on-surface font-body-md selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col overflow-hidden">
<!-- Top Navigation (Shell Suprressed for focused journey, but maintaining Brand Anchor Hierarchy) -->
<header class="flex justify-between items-center w-full px-6 py-6 z-10">
<button aria-label="Go back" class="w-12 h-12 flex items-center justify-center rounded-full bg-[#111111] border border-[#2C2C2E] active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[#F5F5F5]">arrow_back</span>
</button>
<div class="bg-[#FF3B30] text-[#F5F5F5] p-1 rounded-sm text-sm font-black font-h1 tracking-tighter">
            CC
        </div>
<div class="w-12"></div> <!-- Spacer for symmetry -->
</header>
<!-- Main Content: SOS Interface -->
<main class="flex-grow flex flex-col items-center justify-center px-margin text-center">
<!-- Header Section -->
<div class="mb-xl">
<h1 class="font-h1 text-h1 text-[#F5F5F5] mb-2">Emergency?</h1>
<p class="font-body-md text-on-surface-variant max-w-[280px] mx-auto opacity-80">
                Press the button below to alert venue staff instantly.
            </p>
</div>
<!-- Massive SOS Button Container -->
<div class="relative flex items-center justify-center w-[320px] h-[320px]">
<!-- Visual Cues for Pulsing -->
<div class="pulse-effect w-[200px] h-[200px]"></div>
<div class="pulse-effect pulse-effect-delayed w-[200px] h-[200px]"></div>
<!-- Primary SOS Button -->
<button class="relative z-10 w-[200px] h-[200px] bg-[#FF3B30] rounded-full flex flex-col items-center justify-center shadow-[0_0_50px_rgba(255,59,48,0.4)] border-4 border-[#FF3B30] active:scale-90 transition-transform duration-150">
<span class="font-h1 text-[56px] text-[#F5F5F5] leading-none mb-1">SOS</span>
<span class="font-tactical-label text-badge tracking-[0.2em] text-[#F5F5F5] opacity-90">TAP TO ALERT</span>
</button>
</div>
<!-- Tactical Telemetry Status -->
<div class="mt-xl flex flex-col items-center gap-2">
<div class="flex items-center gap-2 bg-[#111111] border border-[#2C2C2E] px-4 py-2 rounded-full">
<span class="material-symbols-outlined text-[#34C759] text-[18px]" style="font-variation-settings: 'FILL' 1;">location_on</span>
<span class="font-tactical-label text-badge text-[#34C759]">LOCATION CAPTURED</span>
</div>
<div class="font-tactical-data text-[10px] text-outline-variant uppercase tracking-widest mt-2">
                Secure link active • Encryption verified
            </div>
</div>
</main>
<!-- Decorative Background Elements -->
<div class="fixed inset-0 pointer-events-none z-0">
<!-- Subtle gradient for depth -->
<div class="absolute bottom-0 left-0 w-full h-[442px] bg-gradient-to-t from-[#1F0F0D]/20 to-transparent"></div>
<!-- Radar Scanning Visual Decoration -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] border border-[#2C2C2E]/30 rounded-full"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[400px] h-[400px] border border-[#2C2C2E]/20 rounded-full"></div>
</div>
<!-- Bottom Contextual Footer -->
<footer class="p-margin flex justify-center items-center gap-6 z-10">
<div class="flex items-center gap-1">
<span class="w-1.5 h-1.5 rounded-full bg-tertiary"></span>
<span class="font-tactical-label text-[10px] text-on-surface-variant">GPS ACCURACY: ±3M</span>
</div>
<div class="w-px h-3 bg-[#2C2C2E]"></div>
<div class="flex items-center gap-1">
<span class="w-1.5 h-1.5 rounded-full bg-tertiary animate-pulse"></span>
<span class="font-tactical-label text-[10px] text-on-surface-variant">SIGNAL: EXCELLENT</span>
</div>
</footer>
<!-- No BottomNavBar or SideNav as per the "Destination" Rule for Transactional/SOS flow -->
</body></html>
