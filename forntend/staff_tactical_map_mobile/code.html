<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }
        .pulse-red {
            box-shadow: 0 0 0 0 rgba(255, 85, 69, 0.7);
            animation: pulse-red-anim 2s infinite;
        }
        @keyframes pulse-red-anim {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 85, 69, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(255, 85, 69, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 85, 69, 0); }
        }
        .pulse-green {
            box-shadow: 0 0 0 0 rgba(104, 211, 252, 0.7);
            animation: pulse-green-anim 2s infinite;
        }
        @keyframes pulse-green-anim {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(104, 211, 252, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(104, 211, 252, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(104, 211, 252, 0); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-hidden">
<!-- TopAppBar -->
<header class="bg-zinc-950 border-b border-zinc-800 flex justify-between items-center w-full px-4 h-16 fixed top-0 z-50">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-red-600" data-icon="security">security</span>
<h1 class="text-xl font-black tracking-widest text-zinc-100 font-['Syne'] uppercase">CRISIS COMMAND</h1>
</div>
<div class="flex items-center gap-2">
<div class="w-10 h-10 rounded-full border border-zinc-800 overflow-hidden">
<img alt="Staff Profile" class="w-full h-full object-cover" data-alt="Close up portrait of a security professional in a dark uniform with a focused expression, neutral studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAkCzvlBFwPA9v29CphEF1OTWTbi1aP6_BFIv0zDaJqm75hyWxYBAt2FxVl5NJHqwmO4VLoWH75mCIH27ZNB0hwq4KkntYXaz2TNH7sMZNDgOYVMYVkT83v6GLre4VRGcPAgb_z13H5xctyQY70Pto_IQRRHPeFTMYNQqb_GRhZwkauvmJgz_sAXKS-4zZCdrUdmwHYgI0Je6bSEjbQx_s0h7V0af5tCsg3qriUvmjdEjuEDpRIkaRtCHiZP53ICGVQlgpU3Hamd4jL"/>
</div>
</div>
</header>
<!-- Main Map Canvas -->
<main class="flex-1 relative w-full h-screen pt-16 pb-24">
<!-- Floor Plan Map Background -->
<div class="absolute inset-0 bg-[#080808] flex items-center justify-center">
<div class="relative w-full h-full opacity-60 mix-blend-screen bg-[url('https://images.unsplash.com/photo-1544383335-9f79c6803efc?auto=format&amp;fit=crop&amp;q=80&amp;w=1200')] bg-center bg-cover" data-alt="Blueprint schematic of a luxury hotel floor plan with neon cyan lines on a pitch black background, technical architectural drawing style">
</div>
<!-- Map Overlay Grid -->
<div class="absolute inset-0 bg-[linear-gradient(rgba(44,44,46,0.1)_1px,transparent_1px),linear-gradient(90deg,rgba(44,44,46,0.1)_1px,transparent_1px)] bg-[size:40px_40px]"></div>
<!-- Incident Icons Overlay -->
<!-- Sector G - Fire -->
<div class="absolute top-[35%] left-[65%] flex flex-col items-center">
<div class="pulse-red bg-primary-container text-on-primary-container p-3 rounded-full flex items-center justify-center z-10">
<span class="material-symbols-outlined" data-icon="local_fire_department" data-weight="fill" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
</div>
<div class="mt-2 px-2 py-1 bg-zinc-950 border border-primary-container rounded text-primary-container font-badge text-badge">SECTOR G</div>
</div>
<!-- VIP Lounge - Medical -->
<div class="absolute top-[55%] left-[25%] flex flex-col items-center">
<div class="pulse-green bg-tertiary-container text-on-tertiary-container p-3 rounded-full flex items-center justify-center z-10">
<span class="material-symbols-outlined" data-icon="medical_services" data-weight="fill" style="font-variation-settings: 'FILL' 1;">medical_services</span>
</div>
<div class="mt-2 px-2 py-1 bg-zinc-950 border border-tertiary-container rounded text-tertiary-container font-badge text-badge">VIP LOUNGE</div>
</div>
</div>
<!-- Top UI Controls -->
<div class="absolute top-4 left-0 right-0 px-4 flex flex-col gap-4 z-40">
<!-- Search Bar -->
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-zinc-500" data-icon="search">search</span>
<input class="w-full bg-zinc-950/80 backdrop-blur-md border border-zinc-800 rounded-xl pl-12 pr-4 py-4 text-zinc-100 font-tactical-data focus:outline-none focus:border-zinc-100 transition-colors" placeholder="Sector/Room" type="text"/>
</div>
</div>
<!-- Floating Action Buttons (FABs) -->
<div class="absolute right-4 bottom-40 flex flex-col gap-3 z-40">
<button class="w-12 h-12 bg-zinc-950/80 backdrop-blur-md border border-zinc-800 rounded-lg flex items-center justify-center text-zinc-100 hover:bg-zinc-900 transition-colors active:scale-90">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
<button class="w-12 h-12 bg-zinc-950/80 backdrop-blur-md border border-zinc-800 rounded-lg flex items-center justify-center text-zinc-100 hover:bg-zinc-900 transition-colors active:scale-90">
<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>
<button class="w-12 h-12 bg-zinc-100 border border-zinc-800 rounded-lg flex items-center justify-center text-zinc-950 hover:bg-zinc-200 transition-colors active:scale-90">
<span class="material-symbols-outlined" data-icon="my_location">my_location</span>
</button>
</div>
<!-- Incident Drawer -->
<div class="absolute bottom-24 left-0 right-0 px-4 z-40">
<div class="bg-zinc-950/90 backdrop-blur-xl border border-zinc-800 rounded-2xl p-4 shadow-2xl flex items-center justify-between gap-4">
<div class="flex items-center gap-4">
<div class="w-1.5 h-12 bg-red-600 rounded-full"></div>
<div>
<div class="flex items-center gap-2 mb-1">
<span class="font-tactical-label text-red-600 uppercase">Active Incident</span>
<span class="w-2 h-2 rounded-full bg-red-600 animate-pulse"></span>
</div>
<h2 class="font-h3 text-zinc-100 text-lg leading-tight">Sector G - Fire</h2>
<div class="font-tactical-data text-zinc-500 text-xs mt-1">Status: Uncontained • 4:12m Elapsed</div>
</div>
</div>
<button class="bg-zinc-100 text-zinc-950 font-['Syne'] font-bold px-6 py-3 rounded-xl active:scale-95 transition-transform">
                    Quick Respond
                </button>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-zinc-950/95 backdrop-blur-md border-t border-zinc-800 h-20">
<div class="flex flex-col items-center justify-center text-zinc-500 py-1 px-3 hover:text-zinc-200 transition-all cursor-pointer">
<span class="material-symbols-outlined mb-1" data-icon="analytics">analytics</span>
<span class="font-['Space_Mono'] text-[10px] uppercase tracking-widest">Status</span>
</div>
<div class="flex flex-col items-center justify-center bg-zinc-100 text-zinc-950 rounded-lg py-1 px-3 transition-all cursor-pointer">
<span class="material-symbols-outlined mb-1" data-icon="map" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-['Space_Mono'] text-[10px] uppercase tracking-widest">Tactical</span>
</div>
<div class="flex flex-col items-center justify-center text-zinc-500 py-1 px-3 hover:text-zinc-200 transition-all cursor-pointer">
<span class="material-symbols-outlined mb-1" data-icon="rss_feed">rss_feed</span>
<span class="font-['Space_Mono'] text-[10px] uppercase tracking-widest">Feed</span>
</div>
<div class="flex flex-col items-center justify-center text-zinc-500 py-1 px-3 hover:text-zinc-200 transition-all cursor-pointer">
<span class="material-symbols-outlined mb-1" data-icon="account_circle">account_circle</span>
<span class="font-['Space_Mono'] text-[10px] uppercase tracking-widest">Profile</span>
</div>
</nav>
</body></html>
